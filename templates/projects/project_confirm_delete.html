<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Eliminar Proyecto - SecureCode Lab</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand">SecureCode Lab</span>
</nav>

<div class="container mt-5" style="max-width: 500px;">
    <div class="card border-danger">
        <div class="card-header bg-danger text-white">Confirmar eliminación</div>
        <div class="card-body">
            <p>¿Estás seguro de que deseas eliminar el proyecto <strong>{{ project.name }}</strong>?</p>
            <p class="text-muted small">Esta acción no se puede deshacer. El archivo también será eliminado.</p>
            <form method="post">
                {% csrf_token %}
                <div class="d-flex justify-content-between">
                    <a href="{% url 'project_list' %}" class="btn btn-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-danger">Sí, eliminar</button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
